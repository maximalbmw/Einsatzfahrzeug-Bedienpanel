<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Einsatzfahrzeug Panel</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">

</head>
<body>
  <div class="panel">
    <button class="btn blue" onclick="playLoop('landhorn')">
    <button class="btn blue" onclick="playLoop('stadthorn')">
    <button class="btn red" onclick="stopSound()">
    <button class="btn white"><span>💡</span><p>Frontlicht</p></button>
    <button class="btn orange"><span>🚪</span><p>Tür</p></button>
    <button class="btn red"><span>⛔</span><p>Stop</p></button>
  </div>

  <script src="app.js"></script>
</body>
</html>
