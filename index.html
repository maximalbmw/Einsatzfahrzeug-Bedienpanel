<div class="panel">
  <button class="btn blue" onclick="startLoop('landhorn')">
    <span class="icon">🔊</span>
    <span class="label">Landhorn</span>
  </button>

  <button class="btn blue" onclick="startLoop('stadthorn')">
    <span class="icon">📢</span>
    <span class="label">Stadthorn</span>
  </button>

  <button class="btn cyan" onclick="startLoop('sirene')">
    <span class="icon">🚨</span>
    <span class="label">Sirene</span>
  </button>

  <button class="btn white" onclick="toggleLight('front')">
    <span class="icon">💡</span>
    <span class="label">Frontlicht</span>
  </button>

  <button class="btn orange" onclick="toggleDoor('front')">
    <span class="icon">🚪</span>
    <span class="label">Tür</span>
  </button>

  <button class="btn red" onclick="stopLoop()">
    <span class="icon">⛔</span>
    <span class="label">Stop</span>
  </button>
</div>
