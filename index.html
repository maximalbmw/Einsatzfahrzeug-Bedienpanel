<!DOCTYPE html>

  <title>Einsatzfahrzeug Panel</title>

</head>
<body>

    <button class="btn blue" onclick="playLoop('landhorn')">Landhorn</button>

    <button class="btn red2"><span>🚨</span><p>Notruf</p></button>
  </div>

  <script src="app.js"></script>

</html>
