<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Einsatzfahrzeug Panel</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">

</head>
<body>
  <div class="panel">
    <button class="btn red" onclick="startLoop('landhorn')">Landhorn AN</button>
    <button class="btn red" onclick="startLoop('stadthorn')">Stadthorn AN</button>
    <button class="btn orange" onclick="stopLoop()">AUS</button>
    <button class="btn blue" onclick="playSound('sirene')">Blitzlicht - Mode 1</button>
    <button class="btn blue" onclick="toggleLight('blues')">Blitzlicht - Mode 2</button>
    <button class="btn white" onclick="toggleLight('front')">Funk - An</button>
    <button class="btn orange" onclick="toggleDoor('front')">Funk - Aus</button>
    <button class="btn red2" onclick="toggleDoor('tailgate')">Notruf</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
