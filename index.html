<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Einsatzfahrzeug Panel</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
  <div class="panel">

    <!-- Horn-Sektion -->
    <section class="section">
      <h2 class="section-title">🔊 Horn</h2>
      <div class="button-group">
        <button class="btn blue" id="btn-landhorn" onclick="playLoop('landhorn')">
          <span class="btn-icon">🔉</span>
          <span class="btn-label">Landhorn</span>
        </button>
        <button class="btn blue" id="btn-stadthorn" onclick="playLoop('stadthorn')">
          <span class="btn-icon">🔊</span>
          <span class="btn-label">Stadthorn</span>
        </button>
        <button class="btn red" id="btn-stop" onclick="stopSound()">
          <span class="btn-icon">🔇</span>
          <span class="btn-label">Horn Aus</span>
        </button>
      </div>
    </section>

    <!-- Licht-Sektion -->
    <section class="section">
      <h2 class="section-title">💡 Blitzlicht</h2>
      <div class="button-group">
        <button class="btn cyan" id="btn-blitz1">
          <span class="btn-icon">💡</span>
          <span class="btn-label">Mode 1</span>
        </button>
        <button class="btn cyan" id="btn-blitz2">
          <span class="btn-icon">💡</span>
          <span class="btn-label">Mode 2</span>
        </button>
      </div>
    </section>

    <!-- Notruf-Sektion -->
    <section class="section section-emergency">
      <h2 class="section-title">🚨 Notruf</h2>
      <div class="button-group">
        <button class="btn emergency" id="btn-notruf">
          <span class="btn-icon">🚨</span>
          <span class="btn-label">Notruf senden</span>
        </button>
      </div>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
